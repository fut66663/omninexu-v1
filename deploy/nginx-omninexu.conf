# OmniNexu MVP — Nginx reverse proxy
# Place: /etc/nginx/sites-available/omninexu.conf
# Activate: ln -s /etc/nginx/sites-available/omninexu.conf /etc/nginx/sites-enabled/

upstream omninexu_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Rate limit: 30 req/min per IP (MVP conservative)
limit_req_zone $binary_remote_addr zone=omninexu_api:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/omninexu-access.log;
    error_log  /var/log/nginx/omninexu-error.log;

    # ── Health check (no rate limit) ──
    location /v1/health {
        proxy_pass http://omninexu_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API (rate limited) ──
    location / {
        limit_req zone=omninexu_api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://omninexu_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Don't buffer — FastAPI streaming-ready
        proxy_buffering off;
    }
}
